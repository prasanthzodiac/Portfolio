# Render Blueprint — static Vite + React SPA
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: portfolio
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
